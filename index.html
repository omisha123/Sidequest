<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle Solver</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>Wordle Solver</h1>
<div id="game-section" class="card">
<div class="status-bar">
<span>Turn <b id="turn-num">1</b>/6</span>
<span><b id="words-left">0</b> words left</span>
</div>
<div class="suggestion-box">
<p>Suggested Word</p>
<h2 id="suggested-word">-----</h2>
</div>
<div class="input-group">
<label>Word You Played</label>
<input type="text" id="typed-word" maxlength="5" autocomplete="off">
</div>
<div class="input-group">
<label>Click letters to change colour</label>
<div class="tile-row">
<button type="button" class="letter grey" data-state="0"></button>
<button type="button" class="letter grey" data-state="0"></button>
<button type="button" class="letter grey" data-state="0"></button>
<button type="button" class="letter grey" data-state="0"></button>
<button type="button" class="letter grey" data-state="0"></button>
</div>
</div>
<button id="submit-btn" class="primary-btn">Submit</button>
<button id="reset-btn" class="secondary-btn">Reset</button>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
